<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My-Anime</title>
<style>
/* FULL CSS */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d1a;--bg2:#12122a;--bg3:#1a1a35;--card:#161630;--border:#252550;--purple:#7c3aed;--purple2:#6d28d9;--pl:#a78bfa;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--gold:#f59e0b;--red:#ef4444;--green:#22c55e;--header:62px;--r:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.loader-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:9999}
.loader-logo{font-size:40px;font-weight:900;display:flex;align-items:center;gap:4px}
.loader-bar{width:280px;height:4px;background:var(--bg3);border-radius:4px;overflow:hidden}
.loader-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .4s;width:0}
.header-inner{display:flex;align-items:center;gap:12px;padding:0 20px;height:62px}
.logo{font-size:26px;font-weight:900;display:flex;align-items:center;gap:3px}
.logo-num{background:var(--purple);color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
.search-wrap{position:relative;flex:1;max-width:500px}
.search-wrap input{flex:1;background:var(--bg3);border:1px solid var(--border);border-right:none;color:var(--text);padding:9px 14px;border-radius:8px 0 0 8px;outline:none}
.search-wrap>button{background:var(--purple);border:none;color:#fff;padding:0 16px;border-radius:0 8px 8px 0}
.anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:16px}
.anime-card{background:var(--card);border-radius:8px;overflow:hidden;cursor:pointer}
.card-img img{width:100%;height:240px;object-fit:cover}
.card-title{font-size:13px;font-weight:700;padding:8px}
.player-page-inner{padding:20px}
.video-wrap video{width:100%;max-height:510px;background:#000}
.ep-grid{display:flex;flex-wrap:wrap;gap:8px}
.ep-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:6px}
.ep-btn.active{background:var(--purple);color:#fff}
</style>
</head>
<body class="dark-mode">

<div id="loaderScreen" class="loader-screen">
  <div class="loader-logo"><span class="logo-num">M</span><span class="logo-txt">y-Anime</span></div>
  <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
  <p class="loader-msg" id="loaderMsg">Loading anime.json from root...</p>
</div>

<header id="siteHeader" style="display:none">
  <div class="header-inner">
    <button class="menu-btn" id="menuToggle">&#9776;</button>
    <a href="#" class="logo" onclick="showPage('home');return false"><span class="logo-num">M</span><span class="logo-txt">y-Anime</span></a>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off">
      <button id="searchBtn">🔍</button>
    </div>
    <button class="icon-btn" id="randomBtn">🎲</button>
  </div>
</header>

<div id="playerPage" style="display:none">
  <div class="player-page-inner">
    <div onclick="closePlayerPage()" style="cursor:pointer;margin-bottom:10px">← Back</div>
    <div class="video-wrap">
      <video id="videoEl" controls></video>
    </div>
    <div style="margin:15px 0">
      <div id="playerTypeTabs" style="display:flex;gap:10px;margin-bottom:10px"></div>
      <div id="epGrid" class="ep-grid"></div>
    </div>
    <div>
      <h2 id="pmsTitle"></h2>
      <div id="pmsGenres"></div>
      <p id="pmsDesc"></p>
    </div>
  </div>
</div>

<main id="mainContent" style="display:none;padding:20px">
  <div id="homePage">
    <h2>Recently Added</h2>
    <div class="anime-grid" id="recentGrid"></div>
  </div>
</main>

<script>
// ==================== FULL JS - anime.json IN ROOT ====================
const OWNER = "Ninjanoah121312";
const REPO = "My-Anime";
const BRANCH = "main";
const GHAPI = `https://api.github.com/repos/${OWNER}/${REPO}`;

let allAnimes = [];
let currentAnime = null;
let currentDub = "sub";

async function apiGet(path) {
  try {
    const r = await fetch(`${GHAPI}/contents/${encodeURIComponent(path)}`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function loadAnimes() {
  const central = await apiGet("anime.json");
  if (!central || !central.content) {
    document.getElementById("loaderMsg").innerHTML = "No anime.json found in root.<br>Please make sure the file exists.";
    return [];
  }

  try {
    const txt = decodeURIComponent(escape(atob(central.content.replace(/\s/g,""))));
    const data = JSON.parse(txt);
    if (!Array.isArray(data)) return [];

    const list = [];
    for (const aj of data) {
      const episodes = [];

      // SUB
      if (aj.sub && typeof aj.sub === "object") {
        Object.keys(aj.sub).forEach(key => {
          episodes.push({
            num: parseInt(key.replace("EP:", "").trim()) || 1,
            type: "sub",
            label: key.trim(),
            url: aj.sub[key]
          });
        });
      }

      // DUB
      if (aj.dub && typeof aj.dub === "object") {
        Object.keys(aj.dub).forEach(key => {
          episodes.push({
            num: parseInt(key.replace("EP:", "").trim()) || 1,
            type: "dub",
            label: key.trim(),
            url: aj.dub[key]
          });
        });
      }

      episodes.sort((a,b) => a.num - b.num || a.type.localeCompare(b.type));

      list.push({
        name: aj.title,
        episodes: episodes,
        image: aj.image,
        desc: aj.description || "",
        genres: aj.genres || []
      });
    }
    return list;
  } catch(e) {
    console.error(e);
    document.getElementById("loaderMsg").textContent = "Error reading anime.json";
    return [];
  }
}

async function init() {
  allAnimes = await loadAnimes();

  if (allAnimes.length === 0) return;

  document.getElementById("loaderScreen").style.display = "none";
  document.getElementById("siteHeader").style.display = "";
  document.getElementById("mainContent").style.display = "";

  renderRecent();
}

function renderRecent() {
  const grid = document.getElementById("recentGrid");
  grid.innerHTML = allAnimes.map(a => `
    <div class="anime-card" onclick="openAnime('${a.name.replace(/'/g, "\\'")}')">
      <div class="card-img">
        ${a.image ? `<img src="${a.image}" alt="${a.name}">` : `<div style="height:240px;background:#222;display:flex;align-items:center;justify-content:center;font-size:60px;color:#666">${a.name[0]}</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${a.name}</div>
      </div>
    </div>
  `).join("");
}

function openAnime(name) {
  currentAnime = allAnimes.find(a => a.name === name);
  if (!currentAnime) return;

  currentDub = currentAnime.episodes.some(e => e.type === "sub") ? "sub" : "dub";

  document.getElementById("mainContent").style.display = "none";
  document.getElementById("playerPage").style.display = "";

  document.getElementById("bcTitle").textContent = currentAnime.name;
  document.getElementById("pmsTitle").textContent = currentAnime.name;
  document.getElementById("pmsDesc").textContent = currentAnime.desc || "";

  buildPlayerUI();
}

function buildPlayerUI() {
  const hasSub = currentAnime.episodes.some(e => e.type === "sub");
  const hasDub = currentAnime.episodes.some(e => e.type === "dub");

  let tabsHTML = "";
  if (hasSub) tabsHTML += `<button onclick="switchDub('sub')" style="padding:8px 16px;margin-right:8px;background:${currentDub==='sub'?'#7c3aed':'#333'}">SUB</button>`;
  if (hasDub) tabsHTML += `<button onclick="switchDub('dub')" style="padding:8px 16px;background:${currentDub==='dub'?'#7c3aed':'#333'}">DUB</button>`;

  document.getElementById("playerTypeTabs").innerHTML = tabsHTML;
  buildEpGrid();
}

function switchDub(mode) {
  currentDub = mode;
  buildPlayerUI();
}

function buildEpGrid() {
  const eps = currentAnime.episodes.filter(e => e.type === currentDub);
  document.getElementById("epGrid").innerHTML = eps.map((ep, i) => `
    <button class="ep-btn" onclick="playEp(${i})">${ep.label}</button>
  `).join("");
}

function playEp(idx) {
  const eps = currentAnime.episodes.filter(e => e.type === currentDub);
  const ep = eps[idx];
  const video = document.getElementById("videoEl");
  video.src = ep.url;
  video.play().catch(()=>{});
}

function closePlayerPage() {
  document.getElementById("playerPage").style.display = "none";
  document.getElementById("mainContent").style.display = "";
  document.getElementById("videoEl").pause();
}

function showPage(page) {
  // simple for now
  document.getElementById("homePage").style.display = page === "home" ? "" : "none";
}

document.getElementById("randomBtn").onclick = () => {
  if (allAnimes.length === 0) return;
  const randomAnime = allAnimes[Math.floor(Math.random() * allAnimes.length)];
  openAnime(randomAnime.name);
};

document.getElementById("menuToggle").onclick = () => {
  document.getElementById("sidenav").classList.toggle("open");
};

init();
</script>
</body>
</html>
