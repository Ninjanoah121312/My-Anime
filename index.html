<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My-Anime</title>
<style>
/* Full CSS */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d1a;--bg2:#12122a;--bg3:#1a1a35;--card:#161630;--border:#252550;--purple:#7c3aed;--purple2:#6d28d9;--pl:#a78bfa;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--gold:#f59e0b;--red:#ef4444;--green:#22c55e;--header:62px;--r:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.loader-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:9999}
.loader-logo{font-size:40px;font-weight:900;display:flex;align-items:center;gap:4px}
.loader-bar{width:280px;height:4px;background:#333;border-radius:4px;overflow:hidden}
.loader-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .4s;width:0}
.header-inner{display:flex;align-items:center;gap:12px;padding:0 20px;height:62px;background:rgba(13,13,26,.97)}
.logo{font-size:26px;font-weight:900;display:flex;align-items:center;gap:3px}
.logo-num{background:var(--purple);color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
.search-wrap{position:relative;flex:1;max-width:500px}
.search-wrap input{flex:1;background:#1f1f3a;border:1px solid #333;color:#ddd;padding:9px 14px;border-radius:8px 0 0 8px;outline:none}
.search-wrap>button{background:var(--purple);border:none;color:#fff;padding:0 16px;border-radius:0 8px 8px 0}
.anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:16px}
.anime-card{background:#1f1f3a;border-radius:8px;overflow:hidden;cursor:pointer}
.card-img img{width:100%;height:240px;object-fit:cover}
.card-title{font-size:13px;font-weight:700;padding:8px}
.video-wrap video{width:100%;max-height:510px;background:#000}
.ep-grid{display:flex;flex-wrap:wrap;gap:8px}
.ep-btn{background:#1f1f3a;border:1px solid #444;color:#ddd;padding:8px 14px;border-radius:6px}
.ep-btn.active{background:var(--purple);color:#fff}
</style>
</head>
<body>

<div id="loaderScreen" class="loader-screen">
  <div class="loader-logo"><span class="logo-num">M</span><span class="logo-txt">y-Anime</span></div>
  <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
  <p class="loader-msg" id="loaderMsg">Loading anime.json...</p>
</div>

<header id="siteHeader" style="display:none">
  <div class="header-inner">
    <button onclick="document.getElementById('sidenav').classList.toggle('open')">☰</button>
    <a href="#" onclick="showPage('home');return false" style="text-decoration:none;color:inherit"><span class="logo-num">M</span><span class="logo-txt">y-Anime</span></a>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search anime..." onkeypress="if(event.key==='Enter') doSearch()">
      <button onclick="doSearch()">🔍</button>
    </div>
    <button onclick="randomAnime()">🎲</button>
  </div>
</header>

<div id="playerPage" style="display:none;padding:20px">
  <div onclick="closePlayerPage()" style="cursor:pointer;color:#aaa;margin-bottom:10px">← Back to home</div>
  <div class="video-wrap">
    <video id="videoEl" controls style="width:100%"></video>
  </div>
  <div style="margin:15px 0">
    <div id="playerTypeTabs" style="display:flex;gap:10px"></div>
    <div id="epGrid" class="ep-grid"></div>
  </div>
  <h2 id="pmsTitle"></h2>
  <div id="pmsGenres"></div>
  <p id="pmsDesc"></p>
</div>

<main id="mainContent" style="display:none;padding:20px">
  <div id="homePage">
    <h2>Recently Added</h2>
    <div class="anime-grid" id="recentGrid"></div>
  </div>
</main>

<script>
// ==================== FULL WORKING JS ====================
const OWNER = "Ninjanoah121312";
const REPO = "My-Anime";
const BRANCH = "main";
const GHAPI = `https://api.github.com/repos/${OWNER}/${REPO}`;

let allAnimes = [];
let currentAnime = null;
let currentDub = "sub";

async function loadAnimes() {
  try {
    const res = await fetch(`${GHAPI}/contents/anime.json`);
    if (!res.ok) throw new Error("File not found");
    const file = await res.json();
    const content = decodeURIComponent(escape(atob(file.content.replace(/\s/g, ''))));
    const data = JSON.parse(content);

    const list = [];
    for (const item of data) {
      const episodes = [];

      // SUB
      if (item.sub && typeof item.sub === 'object') {
        Object.keys(item.sub).forEach(key => {
          episodes.push({
            type: "sub",
            label: key,
            url: item.sub[key]
          });
        });
      }

      // DUB
      if (item.dub && typeof item.dub === 'object') {
        Object.keys(item.dub).forEach(key => {
          episodes.push({
            type: "dub",
            label: key,
            url: item.dub[key]
          });
        });
      }

      list.push({
        name: item.title,
        episodes: episodes,
        image: item.image,
        desc: item.description || "",
        genres: item.genres || []
      });
    }
    return list;
  } catch (e) {
    console.error(e);
    document.getElementById("loaderMsg").textContent = "Error reading anime.json";
    return [];
  }
}

async function init() {
  allAnimes = await loadAnimes();

  if (allAnimes.length === 0) {
    document.getElementById("loaderMsg").innerHTML = "No anime found.<br>Check anime.json in root.";
    return;
  }

  document.getElementById("loaderScreen").style.display = "none";
  document.getElementById("siteHeader").style.display = "block";
  document.getElementById("mainContent").style.display = "block";

  renderHome();
}

function renderHome() {
  const grid = document.getElementById("recentGrid");
  grid.innerHTML = allAnimes.map(anime => `
    <div class="anime-card" onclick="openAnime('${anime.name.replace(/'/g, "\\'")}')">
      <div class="card-img">
        ${anime.image ? `<img src="${anime.image}" alt="${anime.name}">` : `<div style="height:240px;background:#222;color:#666;display:flex;align-items:center;justify-content:center;font-size:80px">${anime.name[0]}</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${anime.name}</div>
      </div>
    </div>
  `).join('');
}

function openAnime(name) {
  currentAnime = allAnimes.find(a => a.name === name);
  if (!currentAnime) return;

  currentDub = currentAnime.episodes.some(e => e.type === "sub") ? "sub" : "dub";

  document.getElementById("mainContent").style.display = "none";
  document.getElementById("playerPage").style.display = "block";

  document.getElementById("pmsTitle").textContent = currentAnime.name;
  document.getElementById("pmsDesc").textContent = currentAnime.desc;
  document.getElementById("pmsGenres").innerHTML = currentAnime.genres.map(g => `<span style="margin-right:6px;background:#4c1d95;padding:2px 8px;border-radius:999px">${g}</span>`).join('');

  buildTabsAndGrid();
}

function buildTabsAndGrid() {
  const tabs = document.getElementById("playerTypeTabs");
  tabs.innerHTML = `
    <button onclick="switchType('sub')" style="padding:8px 16px;background:${currentDub==='sub' ? '#7c3aed' : '#333'}">SUB</button>
    <button onclick="switchType('dub')" style="padding:8px 16px;background:${currentDub==='dub' ? '#7c3aed' : '#333'}">DUB</button>
  `;

  const eps = currentAnime.episodes.filter(e => e.type === currentDub);
  document.getElementById("epGrid").innerHTML = eps.map((ep, i) => `
    <button onclick="playEpisode(${i})" style="padding:8px 12px;margin:4px;background:#333;border:none;color:white;border-radius:4px">${ep.label}</button>
  `).join('');
}

function switchType(type) {
  currentDub = type;
  buildTabsAndGrid();
}

function playEpisode(idx) {
  const eps = currentAnime.episodes.filter(e => e.type === currentDub);
  const ep = eps[idx];
  const video = document.getElementById("videoEl");
  video.src = ep.url;
  video.play().catch(() => {});
}

function closePlayerPage() {
  document.getElementById("playerPage").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
  document.getElementById("videoEl").pause();
}

function doSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!q) return;
  const results = allAnimes.filter(a => a.name.toLowerCase().includes(q));
  document.getElementById("recentGrid").innerHTML = results.map(a => `
    <div class="anime-card" onclick="openAnime('${a.name.replace(/'/g, "\\'")}')">
      <div class="card-img">
        ${a.image ? `<img src="${a.image}" alt="${a.name}">` : `<div style="height:240px;background:#222;color:#666;display:flex;align-items:center;justify-content:center;font-size:80px">${a.name[0]}</div>`}
      </div>
      <div class="card-body">
        <div class="card-title">${a.name}</div>
      </div>
    </div>
  `).join('');
}

function randomAnime() {
  if (!allAnimes.length) return;
  const random = allAnimes[Math.floor(Math.random() * allAnimes.length)];
  openAnime(random.name);
}

init();
</script>
</body>
</html>
